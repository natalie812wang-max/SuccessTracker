<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌟 Success Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <style>
    /* 样式保持不变，省略...（与您原代码一致） */
    /* 为了节省篇幅，此处省略样式，实际使用时请保留原样式 */
  </style>
</head>
<body>

  <!-- HTML结构不变（与您原代码完全一致） -->
  <!-- ... 省略重复内容 ... -->

  <script>
    (function() {
      'use strict';

      // ============================================================
      // 🔧 重要！请替换为您的 Supabase 实际值
      // ============================================================
      const SUPABASE_URL = 'https://fetdirwyenqqchcpbhld.supabase.co';   // <-- 替换
      const SUPABASE_ANON_KEY = 'sb_publishable_AzMdS9DhKvQ5ty4TOm0_hA_tUnf2fNH';                // <-- 替换
      const STORAGE_BUCKET = 'task-replies';
      // ============================================================

      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // ... 变量定义不变 ...

      // ============================================================
      // 所有函数定义（保持不变，但确保以下函数存在）
      // ============================================================
      function cancelReply() {
        document.getElementById('replyModal').classList.add('hidden');
      }

      async function submitReply() {
        const text = document.getElementById('replyText').value.trim();
        const fileInput = document.getElementById('replyFile');
        const file = fileInput.files[0];
        let fileName = '',
          fileUrl = '';

        if (file) {
          try {
            fileUrl = await uploadFile(file);
            fileName = file.name;
          } catch (err) {
            alert('文件上传失败: ' + err.message);
            return;
          }
        }

        if (!text && !fileName) { alert('Please write a message or attach a file.'); return; }

        const task = tasks.find(t => t.id === replyTargetId);
        if (!task) return;

        if (replyIsEdit) {
          task.reply = { text: text || 'No text', fileName, fileUrl };
          await saveTask(task);
          clearReplyDraft(replyTargetId);
          document.getElementById('replyModal').classList.add('hidden');
          return;
        }

        task.completed = true;
        task.reply = { text: text || 'No text', fileName, fileUrl };
        task.completed_at = new Date().toISOString();
        task.auto_score_applied = false;
        await saveTask(task);
        clearReplyDraft(replyTargetId);
        document.getElementById('replyModal').classList.add('hidden');
      }

      // ... 其他函数（render、loadAllData、openReplyModal 等）保持不变 ...

      // ============================================================
      // 事件绑定（重点修改）
      // ============================================================
      function bindEvents() {
        // ... 登录、日志、管理按钮等不变 ...

        // ===== 回复弹窗按钮：直接绑定（取代委托） =====
        const replyCancelBtn = document.getElementById('replyCancel');
        const replyConfirmBtn = document.getElementById('replyConfirm');

        // 移除旧监听（防止重复绑定）
        replyCancelBtn.replaceWith(replyCancelBtn.cloneNode(true));
        replyConfirmBtn.replaceWith(replyConfirmBtn.cloneNode(true));

        // 重新获取新节点并绑定
        document.getElementById('replyCancel').addEventListener('click', function(e) {
          e.preventDefault();
          cancelReply();
        });
        document.getElementById('replyConfirm').addEventListener('click', function(e) {
          e.preventDefault();
          submitReply();
        });

        // 查看回复关闭
        document.getElementById('viewReplyClose').addEventListener('click', function() {
          document.getElementById('viewReplyModal').classList.add('hidden');
        });

        // ... 其余绑定不变（评分、获奖、兑换、反思等） ...

        // 特别提醒：检查任务列表是否为空，显示提示
        console.log('Events bound successfully.');
      }

      // ============================================================
      // 初始化
      // ============================================================
      async function init() {
        try {
          const { data: { session } } = await sb.auth.getSession();
          if (session) {
            const { data: profile, error: profileError } = await sb.from('profiles').select('*').eq('id', session.user.id)
              .maybeSingle();
            if (profileError) throw profileError;
            if (profile) {
              currentUser = profile;
              currentUserRole = profile.role;
              document.getElementById('loginPage').style.display = 'none';
              document.getElementById('mainApp').classList.add('visible');
              if (profile.role === 'admin') { await requestNotificationPermission(); }
              await loadAllData();
              render();
              bindEvents(); // 绑定事件
              return;
            }
          }
        } catch (e) {
          console.error('Init error:', e);
          alert('初始化失败，请刷新页面或检查 Supabase 配置。');
        }
        document.getElementById('loginPage').style.display = 'flex';
        document.getElementById('mainApp').classList.remove('visible');
        bindEvents();
        updateNotificationStatusUI();
      }

      document.addEventListener('DOMContentLoaded', init);
    })();
  </script>

</body>
</html>
